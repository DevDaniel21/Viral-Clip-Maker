<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clip Maker - AI-Powered Video Editor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.2/dist/gsap.min.js"></script>
</head>

<body class="bg-gradient-to-br from-slate-950 via-slate-900 to-slate-950 text-slate-100 m-0 p-0 overflow-hidden">
    <!-- Background Glow Elements -->
    <div class="fixed inset-0 pointer-events-none overflow-hidden">
        <div class="absolute top-20 right-1/3 w-96 h-96 bg-blue-500 rounded-full blur-3xl opacity-5"></div>
        <div class="absolute bottom-20 left-1/4 w-80 h-80 bg-purple-500 rounded-full blur-3xl opacity-5"></div>
    </div>

    <!-- Main Container (No Scroll) -->
    <div class="relative w-screen h-screen flex flex-col">
        <!-- Header with Glassmorphism -->
        <header class="backdrop-blur-md bg-white/5 border-b border-white/10 py-6 px-8 flex items-center justify-between sticky top-0 z-50">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-lg bg-gradient-to-br from-blue-400 to-purple-500 flex items-center justify-center shadow-lg shadow-blue-500/20">
                    <span class="text-white font-bold text-lg">✂️</span>
                </div>
                <div>
                    <h1 class="text-2xl font-bold tracking-tight text-white">Clip Maker</h1>
                    <p class="text-xs text-slate-400 tracking-wide">AI-Powered Video Moments</p>
                </div>
            </div>
            <div class="hidden md:flex items-center gap-2 px-3 py-1.5 rounded-full bg-white/5 border border-white/10">
                <span class="text-xs text-slate-400">v1.0</span>
            </div>
        </header>

        <!-- Content Area -->
        <main class="flex-1 flex items-center justify-center px-6 py-12 overflow-hidden">
            <div class="w-full max-w-6xl flex flex-col h-full max-h-[calc(100vh-120px)]">
                <!-- Title -->
                <div class="text-center mb-12">
                    <h2 class="text-5xl font-bold tracking-tight mb-2">
                        <span class="bg-gradient-to-r from-blue-400 to-purple-500 bg-clip-text text-transparent">Clip Maker</span>
                    </h2>
                    <p class="text-slate-400 text-lg font-medium">Transforme seus vídeos em conteúdo viral com IA</p>
                </div>

                <!-- Grid Layout -->
                <div class="grid grid-cols-1 lg:grid-cols-2 gap-12 flex-1">
                    <!-- Left Column - Controls -->
                <div class="flex flex-col justify-center space-y-8">
                    <!-- Input Section -->
                    <div class="space-y-4 animate-fade-in">
                        <div>
                            <label for="apiKey" class="block text-sm font-semibold text-slate-200 mb-3 tracking-tight">
                                🔑 Gemini API Key
                            </label>
                            <div class="relative group">
                                <input 
                                    type="password" 
                                    id="apiKey" 
                                    placeholder="Coloque sua chave de API do Gemini aqui" 
                                    class="w-full px-5 py-3.5 rounded-xl bg-white/5 border border-white/10 text-slate-100 placeholder:text-slate-500 font-mono text-sm focus:outline-none focus:ring-2 focus:ring-blue-400/50 focus:border-blue-400/30 transition-all duration-300 hover:border-white/20 hover:bg-white/8"
                                >
                                <div class="absolute inset-0 rounded-xl bg-gradient-to-r from-blue-500/0 to-purple-500/0 group-focus-within:from-blue-500/5 group-focus-within:to-purple-500/5 pointer-events-none transition-all duration-300"></div>
                            </div>
                        </div>

                        <!-- Upload Button -->
                        <div>
                            <button 
                                id="uploadWidget" 
                                class="w-full group relative px-8 py-4 rounded-xl font-semibold tracking-wide text-white transition-all duration-300 overflow-hidden"
                            >
                                <div class="absolute inset-0 bg-gradient-to-r from-blue-500 to-purple-500 group-hover:from-blue-600 group-hover:to-purple-600 transition-all duration-300"></div>
                                <div class="absolute inset-0 opacity-0 group-hover:opacity-100 bg-white/10 transition-all duration-300"></div>
                                <div class="relative flex items-center justify-center gap-2">
                                    <svg class="w-5 h-5 group-hover:scale-110 transition-transform duration-300" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path>
                                    </svg>
                                    <span>Upload Video</span>
                                </div>
                                <div class="absolute inset-0 rounded-xl shadow-lg shadow-blue-500/20 group-hover:shadow-blue-500/40 transition-all duration-300 pointer-events-none"></div>
                            </button>
                        </div>
                    </div>

                    <!-- Status Card -->
                    <div class="group rounded-xl backdrop-blur-sm bg-white/5 border border-white/10 p-5 hover:bg-white/8 hover:border-white/20 transition-all duration-300">
                        <div class="flex items-start gap-3">
                            <div class="flex-shrink-0 mt-1">
                                <div id="statusIndicator" class="w-3 h-3 rounded-full bg-slate-500 animate-pulse transition-colors duration-300"></div>
                            </div>
                            <div class="flex-1 min-w-0">
                                <p class="text-xs font-semibold text-slate-400 uppercase tracking-widest mb-1">Status</p>
                                <p id="status" class="text-sm text-slate-300 leading-relaxed">Aguardando upload...</p>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Right Column - Video Preview -->
                <div class="flex flex-col justify-center">
                    <div class="relative group">
                        <div class="absolute inset-0 bg-gradient-to-r from-blue-500/20 to-purple-500/20 rounded-2xl blur-xl opacity-0 group-hover:opacity-100 transition-all duration-500"></div>
                        <div class="relative rounded-2xl overflow-hidden border border-white/10 bg-black/40 backdrop-blur-sm shadow-2xl shadow-blue-500/10">
                            <div class="aspect-video flex items-center justify-center bg-gradient-to-br from-slate-800 to-slate-900">
                                <video 
                                    id="video" 
                                    src="" 
                                    controls 
                                    class="w-full h-full object-cover hidden"
                                ></video>
                                <div id="videoPlaceholder" class="flex flex-col items-center justify-center gap-3 text-center p-8">
                                    <svg class="w-16 h-16 text-slate-500 opacity-50" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z"></path>
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                                    </svg>
                                    <p class="text-slate-400 text-sm font-medium">Seu clipe viral aparecerá aqui</p>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="https://upload-widget.cloudinary.com/latest/global/all.js" type="text/javascript"></script>

    <script type="text/javascript">

        const el = {
            status: document.getElementById('status'),
            video: document.getElementById('video'),
            apiKey: document.getElementById('apiKey'),
            button: document.getElementById('uploadWidget'),
            videoPlaceholder: document.getElementById('videoPlaceholder'),
            statusIndicator: document.getElementById('statusIndicator')
        }

        const updateStatusIndicator = (state) => {
            const colors = {
                idle: 'bg-slate-500',
                processing: 'bg-yellow-400',
                success: 'bg-emerald-400',
                error: 'bg-red-400'
            }
            el.statusIndicator.className = `w-3 h-3 rounded-full ${colors[state]} animate-pulse transition-colors duration-300`
        }

        const app = {
            transcriptionURL: '',
            public_id: '',
            waitForTranscription: async () => {
                const maxAttempts = 30;
                const delay = 2000; // 2 segundos entre tentativas

                for (let attempt = 1; attempt <= maxAttempts; attempt++) {
                    const url = `https://res.cloudinary.com/${config.cloudName}/raw/upload/v${Date.now()}/${app.public_id}.transcript`

                    try {
                        el.status.textContent = `⏳ Processando transcrição... (${attempt}/${maxAttempts})`;
                        console.log(`Tentativa ${attempt}/${maxAttempts}: Verificando transcrição...`);
                        const response = await fetch(url);

                        if (response.ok) {
                            app.transcriptionURL = url;
                            console.log('Transcrição encontrada!', url);
                            el.status.textContent = '✓ Transcrição encontrada';
                            return true
                        }
                    } catch (error) {
                        console.log(`Tentativa ${attempt} falhou:`, error.message);
                    }

                    // Aguarda antes da próxima tentativa (exceto na última)
                    if (attempt < maxAttempts) {
                        await new Promise(resolve => setTimeout(resolve, delay));
                    }
                }

                console.log('Transcrição não encontrada após todas as tentativas');
                el.status.textContent = '✕ Transcrição não encontrada';
                return false;
            },
            getTranscription: async () => {
                const response = await fetch(app.transcriptionURL)
                return response.text()
            },
            getViralMoment: async () => {
                el.status.textContent = '🤖 Analisando com IA...';
                const transcription = await app.getTranscription()
                const model = 'gemini-3-flash-preview'
                const endpointGemini = `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent`

                const prompt = `
                    Role: You are a professional video editor specializing in viral content.
                    Task: Analyze the transcription below and identify the most engaging, funny, or surprising segment.
                    Constraints:
                    1. Duration: Minimum 30 seconds, Maximum 60 seconds.
                    2. Format: Return ONLY the start and end string for Cloudinary. Format: so_<start_seconds>,eo_<end_seconds>
                    3. Examples: "so_10,eo_20" or "so_12.5,eo_45.2"
                    4. CRITICAL: Do not use markdown, do not use quotes, do not explain. Return ONLY the raw string.

                    Transcription: ${transcription}
                `

                const headers = {
                    'x-goog-api-key': el.apiKey.value,
                    'Content-Type': 'application/json'
                }

                const contents = [
                    {
                        parts: [
                            {
                                text: prompt
                            }
                        ]
                    }
                ]

                const maxAttempts = 3;
                const delay = 1500;

                for (let attempt = 1; attempt <= maxAttempts; attempt++) {
                    try {
                        const response = await fetch(endpointGemini, {
                            method: 'POST',
                            headers,
                            body: JSON.stringify({ contents })
                        })

                        if (!response.ok) {
                            throw new Error(`HTTP ${response.status}`);
                        }

                        const data = await response.json()
                        const rawText = data.candidates[0].content.parts[0].text
                        
                        el.status.textContent = '✓ Clipe gerado com sucesso!';
                        return rawText.replace(/```/g, '').replace(/json/g, "").trim()
                    } catch (error) {
                        const isLastAttempt = attempt === maxAttempts
                        console.log(`Gemini falhou (tentativa ${attempt}/${maxAttempts}):`, error.message)

                        if (isLastAttempt) {
                            throw error;
                        }

                        await new Promise(resolve => setTimeout(resolve, delay));
                    }
                }
            }
        }

        const config = {
            cloudName: 'escreva_seu_cloud_name_aqui',
            uploadPreset: 'escreva_seu_upload_preset_aqui',
        }

        const myWidget = cloudinary.createUploadWidget(
            config,
            async (error, result) => {
                if (!error && result && result.event === "success") {
                    console.log('Done! Here is the image info: ', result.info);
                    app.public_id = result.info.public_id;
                    el.status.textContent = '📤 Upload concluído, processando...';
                    updateStatusIndicator('processing');

                    try {
                        const isReady = await app.waitForTranscription();
                        if (!isReady) {
                            throw new Error('erro ao buscar transcrição')
                        }

                        const viralMoment = await app.getViralMoment()
                        const viralMomentURL = `https://res.cloudinary.com/${config.cloudName}/video/upload/${viralMoment}/${app.public_id}.mp4`
                        el.video.setAttribute('src', viralMomentURL)
                        el.video.classList.remove('hidden');
                        el.videoPlaceholder.classList.add('hidden');
                        el.status.textContent = '✓ Pronto! Seu melhor momento';
                        updateStatusIndicator('success');

                    } catch (error) {
                        console.log({ error })
                        el.status.textContent = `✕ Erro: ${error.message}`;
                        updateStatusIndicator('error');
                    }

                }
            }
        )

        el.button.addEventListener("click", function () {
            if (!el.apiKey.value) {
                alert('Por favor, insira sua API do Gemini primeiro.')
                el.apiKey.focus()
                return
            }
            myWidget.open();
        }, false);
    </script>
</body>

</html>
